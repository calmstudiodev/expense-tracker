<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expense Tracker</h1>

        <div class="tracker-box">

            <div class="section">
                <h2>Income</h2>
                <input type="text" id="incomeDescription" placeholder="Income description">
                <input type="number" id="incomeAmount" placeholder="Income amount">
                <button id="addIncomeBtn">Add Income</button>
                <ul id="incomeList"></ul>
                <h3 id="totalIncome">Total Income: $0</h3>
            </div>

            <div class="section">
                <h2>Expense</h2>
                <input type="text" id="expenseDescription" placeholder="Expense description">
                <input type="number" id="expenseAmount" placeholder="Expense amount">
                <button id="addExpenseBtn">Add Expense</button>
                <ul id="expenseList"></ul>
                <h3 id="totalExpense">Total Expense: $0</h3>
            </div>

            <div class="result-box">
                <h2>Final Result</h2>
                <p id="balance">$0</p>
                <p id="resultMessage">No savings or debt yet.</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
